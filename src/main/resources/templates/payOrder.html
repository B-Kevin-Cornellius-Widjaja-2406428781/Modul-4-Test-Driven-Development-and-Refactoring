<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    
    <h3>Pay Order</h3>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Order Details</h5>
            <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
            <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>
            <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
        </div>
    </div>

    <form th:action="@{/order/pay/{id}(id=${order.id})}" th:object="${paymentData}" method="post">
        <div class="form-group">
            <label for="methodSelect">Payment Method</label>
            <select name="method" class="form-control col-4" id="methodSelect" required>
                <option value="">Select Payment Method</option>
                <option value="VOUCHER_CODE">Voucher Code</option>
                <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
            </select>
        </div>

        <div id="voucherFields" style="display:none;">
            <div class="form-group">
                <label for="voucherCode">Voucher Code</label>
                <input name="voucherCode" type="text" class="form-control col-4" id="voucherCode" placeholder="Enter voucher code (e.g. ESHOP1234ABC5678)">
            </div>
        </div>

        <div id="codFields" style="display:none;">
            <div class="form-group">
                <label for="address">Delivery Address</label>
                <input name="address" type="text" class="form-control col-4" id="address" placeholder="Enter delivery address">
            </div>
            <div class="form-group">
                <label for="deliveryFee">Delivery Fee</label>
                <input name="deliveryFee" type="text" class="form-control col-4" id="deliveryFee" placeholder="Enter delivery fee">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Pay Now</button>
        <a th:href="@{/order/history}" class="btn btn-secondary">Back</a>
    </form>
</div>

<script>
    document.getElementById('methodSelect').addEventListener('change', function() {
        var voucherFields = document.getElementById('voucherFields');
        var codFields = document.getElementById('codFields');
        
        voucherFields.style.display = 'none';
        codFields.style.display = 'none';
        
        if (this.value === 'VOUCHER_CODE') {
            voucherFields.style.display = 'block';
        } else if (this.value === 'CASH_ON_DELIVERY') {
            codFields.style.display = 'block';
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

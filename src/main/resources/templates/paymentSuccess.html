<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div class="alert alert-success">
        <h4 class="alert-heading">Payment Successful!</h4>
        <p>Your payment has been processed successfully.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Payment Details</h5>
            <p><strong>Payment ID:</strong> <span th:text="${paymentId}"></span></p>
            <p><strong>Order ID:</strong> <span th:text="${orderId}"></span></p>
            <p><strong>Status:</strong> <span th:text="${status}"></span></p>
        </div>
    </div>

    <a th:href="@{/order/history}" class="btn btn-primary mt-3">View Order History</a>
    <a th:href="@{/}" class="btn btn-secondary mt-3">Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

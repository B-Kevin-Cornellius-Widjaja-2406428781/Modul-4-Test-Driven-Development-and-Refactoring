<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <h3>Payment Detail</h3>

    <form th:action="@{/payment/detail/{id}(id=${paymentId})}" method="get" class="mb-4">
        <div class="form-group">
            <label for="paymentIdInput">Enter Payment ID</label>
            <input name="paymentId" type="text" class="form-control col-4" id="paymentIdInput" placeholder="Enter payment ID" required>
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/}" class="btn btn-secondary">Back</a>
    </form>

    <div th:if="${payment}">
        <h4>Payment Details</h4>
        <table class="table table-bordered">
            <tr>
                <th>Payment ID</th>
                <td th:text="${payment.id}"></td>
            </tr>
            <tr>
                <th>Method</th>
                <td th:text="${payment.method}"></td>
            </tr>
            <tr>
                <th>Status</th>
                <td th:text="${payment.status}"></td>
            </tr>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

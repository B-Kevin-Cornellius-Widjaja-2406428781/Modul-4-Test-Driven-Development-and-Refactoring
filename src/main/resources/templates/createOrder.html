<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <h3>Create New Order</h3>

    <form th:action="@{/order/create}" method="post">
        <div class="form-group">
            <label for="authorInput">Your Name</label>
            <input name="author" type="text" class="form-control col-4" id="authorInput" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
            <label>Select Products</label>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Select</th>
                        <th>Product Name</th>
                        <th>Quantity Available</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <input type="checkbox" th:name="selectedProducts" th:value="${product.productId}">
                        </td>
                        <td th:text="${product.productName}"></td>
                        <td th:text="${product.productQuantity}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <button type="submit" class="btn btn-primary">Submit Order</button>
        <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

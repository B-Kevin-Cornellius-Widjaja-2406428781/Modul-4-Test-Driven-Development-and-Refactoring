<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail - Admin</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <h3>Payment Details - Admin</h3>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Payment Information</h5>
            <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
            <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
            <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
            
            <div th:if="${payment.paymentData}">
                <h6>Payment Data:</h6>
                <table class="table table-sm">
                    <tr th:each="entry : ${payment.paymentData}">
                        <td th:text="${entry.key}"></td>
                        <td th:text="${entry.value}"></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <h5>Update Payment Status</h5>
    <div class="btn-group" role="group">
        <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post" style="display:inline;">
            <input type="hidden" name="status" value="SUCCESS"/>
            <button type="submit" class="btn btn-success">Accept Payment</button>
        </form>
        
        <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post" style="display:inline;">
            <input type="hidden" name="status" value="REJECTED"/>
            <button type="submit" class="btn btn-danger">Reject Payment</button>
        </form>
    </div>

    <hr>

    <a th:href="@{/payment/admin/list}" class="btn btn-secondary">Back to List</a>
    <a th:href="@{/}" class="btn btn-secondary">Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <h3>Order History</h3>

    <form th:action="@{/order/history}" method="post" class="mb-4">
        <div class="form-group">
            <label for="authorInput">Enter Your Name</label>
            <input name="author" type="text" class="form-control col-4" id="authorInput" placeholder="Enter your name" required>
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/}" class="btn btn-secondary">Back</a>
    </form>

    <div th:if="${orders}">
        <h4>Your Orders</h4>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
            <tr>
                <th>Order ID</th>
                <th>Author</th>
                <th>Status</th>
                <th>Order Time</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.author}"></td>
                <td th:text="${order.status}"></td>
                <td th:text="${#temporals.format(T(java.time.Instant.ofEpochMilli(order.orderTime)).atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'yyyy-MM-dd HH:mm:ss')}"></td>
                <td>
                    <a th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-primary btn-sm">Pay</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
